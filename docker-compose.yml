# Общий compose для папки medical-clinic на сервере.
#
# Структура:
#   medical-clinic/
#     medical-clinic-prod-back/
#     medical-clinic-ui/
#
# Запуск:
#   cd /home/medical-clinic/medical-clinic-ui
#   docker compose up -d --build
#
#   Frontend: http://188.225.58.30:8090
#   Backend:  http://188.225.58.30:8080
#   Admin:    http://188.225.58.30:8090/admin/

services:
  backend:
    build: ../medical-clinic-prod-back
    container_name: medical-clinic-backend
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      USE_S3: ${USE_S3:-False}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://188.225.58.30:8090}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/db.sqlite3}
    volumes:
      - app_data:/data
      - app_media:/app/media

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api/
    container_name: medical-clinic-frontend
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - app_media:/app/media:ro
    depends_on:
      - backend

volumes:
  app_data:
  app_media:
